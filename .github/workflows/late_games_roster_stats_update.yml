
name: Run Roster Stats Update Scheduler

on:
  schedule:
    - cron: "30 14 * * *"   # Runs at 10:30 AM ET every day
  workflow_dispatch:        # Allows manual runs from the Actions tab

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Add repo root to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run MLB scheduler
        run: python data_scheduler/run_morning_games_roster_update_scheduler.py
